name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Docker
        run: docker version

      - name: Run API tests
        run: make test-api

      - name: Build API
        run: make build-api

      - name: Build worker
        run: make build-worker

      - name: Run smoke test
        run: make smoke
